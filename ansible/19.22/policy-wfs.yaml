---
- name: "Create a file system protection policy and rule for windows"
  hosts: localhost
  collections:
    - community.general
  gather_facts: false

  # Playbook variables
  vars:
    anMsgTitle: "( Ansible : v2.6 )"
    anMsgContent:
      - "set_fact content"
    dmMsgTitle: "( {{dmHost}} : v{{dmVersion}} )"
    dmMsgContent:
      - "Wait for HTTPS connectivity on port {{dmPort}}"
      - "Login to Data Manager REST API"
      - "Query for the protection storage"
      - "Create the protection policy"
      - "Create the protection rule"
      - "Logout out of the Data Manager REST API"
  vars_files:
    - vars/vault.yaml
    - vars/environment.yaml

  tasks:
  # Check for connectivity
  - name: "{{ dmMsgTitle }}: {{ dmMsgContent[0] }}"
    wait_for:
      host: "{{dmHost}}"
      port: "{{dmPort}}"
      state: started
      delay: 1
      sleep: 60
      timeout: 600
  
  # Authenticate to the REST API
  - name: "{{ dmMsgTitle }}: {{ dmMsgContent[1] }}"
    uri:
      url: "{{dmBaseUrl}}/v{{version}}/{{endpoint}}"
      method: POST
      validate_certs: no
      return_content: yes
      body_format: json
      body:
        username: "{{dmUser}}"
        password: "{{dmPassword}}"
      status_code: 200
    vars:
      endpoint: login
      version: 2
    register: token

  # Ansible set_fact
  - name: "{{ anMsgTitle }}: {{ anMsgContent[0] }}"
    ansible.builtin.set_fact:
      apiToken: "{{ token.json.access_token }}"

  # START THE WORKFLOW
  # REST API query
  - name: "{{ dmMsgTitle }}: {{ dmMsgContent[2] }}"
    uri:
      url: "{{dmBaseUrl}}/v{{version}}/{{endpoint}}?filter={{filter}}"
      headers:
        Authorization: "Bearer {{apiToken}}"
        Content-Type: "application/json"
      method: GET
      validate_certs: no
      return_content: yes
      body_format: json
    vars:
      endpoint: storage-systems
      version: 2
      filters: 
        - type eq "DATA_DOMAIN_SYSTEM"
        - and name eq "{{ ddHost }}"
      filter: "{{ filters | join(' ') | urlencode() }}"
    register: ddSystems

  # Ansible set_fact
  - name: "{{ anMsgTitle }}: {{ anMsgContent[0] }}"
    ansible.builtin.set_fact:
      ddSystem: "{{ ddSystems.json.content[0] }}"

  # Ansible set_fact
  - name: "{{ anMsgTitle }}: {{ anMsgContent[0] }}"
    ansible.builtin.set_fact:
      guid_1: "{{ lookup( 'password', '/dev/null length=32' ) | to_uuid }}"

  # Ansible set_fact
  - name: "{{ anMsgTitle }}: {{ anMsgContent[0] }}"
    ansible.builtin.set_fact:
      guid_2: "{{ lookup( 'password', '/dev/null length=32' ) | to_uuid }}"

  # Ansible set_fact
  - name: "{{ anMsgTitle }}: {{ anMsgContent[0] }}"
    ansible.builtin.set_fact:
      guid_3: "{{ lookup( 'password', '/dev/null length=32' ) | to_uuid }}"

  - name: "{{ dmMsgTitle }}: {{ dmMsgContent[3] }}"
    uri:
      url: "{{dmBaseUrl}}/v{{version}}/{{endpoint}}"
      headers:
        Authorization: "Bearer {{apiToken}}"
        Content-Type: "application/json"
      method: POST
      validate_certs: no
      return_content: yes
      body_format: json
      body:
        name: "{{ dmPolicyWfs }}"
        description: ""
        purpose: CENTRALIZED
        assetType: FILE_SYSTEM
        disabled: false
        objectives:
          - id: "{{ guid_1 }}"
            type: BACKUP
            operations:
              - id: "{{ guid_2 }}"
                backupLevel: SYNTHETIC_FULL
                schedule:
                  recurrence:
                    pattern:
                      type: DAILY
                  window:
                    startTime: 2025-09-22T01:00:00.0000000Z
                    duration: PT10H
                triggerType: ON_SCHEDULE
            target:
              storageTargetId: 
              preferredInterfaceId: ethV1
              storageContainerId: "{{ ddSystem.id }}"
            retentions:
              - id: "{{ guid_3 }}"
                time:
                - unitValue: 7
                  unitType: DAY
                  type: RETENTION
                copySelector:
                  operationId: "{{ guid_2 }}"
              - id: "{{ lookup( 'password', '/dev/null length=32' ) | to_uuid }}"
                time:
                - unitValue: 7
                  unitType: DAY
                  type: RETENTION
            config:
              dataConsistency: CRASH_CONSISTENT
              forceFull: false
              excludeFilterIds:
              backupMechanism: AUTO
            options:
              debugEnabled: false
              indexingEnabled: true
              anomalyDetectionEnabled: true
              systemStateRecoveryOnly: false
              ignoreMissingSystemStateFiles: true
              excludeNonCriticalDynamicDisks: false
              ignoreThirdPartyServices: false
      status_code: 201 
    vars:
      endpoint: protection-policies
      version: 3
    register: policy

  - name: "{{ dmMsgTitle }}: {{ dmMsgContent[4] }}"
    uri:
      url: "{{dmBaseUrl}}/v{{version}}/{{endpoint}}"
      headers:
        Authorization: "Bearer {{apiToken}}"
        Content-Type: "application/json"
      method: POST
      validate_certs: no
      return_content: yes
      body_format: json
      body:
        name: "{{ dmPolicyWfs }}"
        action: MOVE_TO_GROUP
        actionResult: "{{ policy.json.id }}"
        inventorySourceType: FILE_SYSTEM
        category: COMPOUND
        rules:
          - name: sub1_{{ dmPolicyWfs }}
            category: PRIMITIVE
            conditionConnector: AND
            logicalOperator: AND
            conditions:
            - assetAttributeName: attributes.fileSystem.hostOS
              operator: EQUALS
              assetAttributeValues:
              - WINDOWS
            - assetAttributeName: name
              operator: DOES_NOT_CONTAIN
              assetAttributeValues:
              - DISASTER_RECOVERY
        conditionConnector: OR
        logicalOperator: OR
        priority: -1
        tenant:
          id: 00000000-0000-4000-a000-000000000000
      status_code: 201 
    vars:
      endpoint: protection-rules
      version: 2
    register: rule
  # END THE WORKFLOW

  # Log out of the REST API
  - name: "{{ dmMsgTitle }}: {{ dmMsgContent[-1] }}"
    uri:
      url: "{{dmBaseUrl}}/v{{version}}/{{endpoint}}"
      headers:
        Authorization: "Bearer {{apiToken}}"
        Content-Type: "application/json"
      method: POST
      validate_certs: no
      return_content: yes
      body_format: json
      status_code: 204
    vars:
      endpoint: logout
      version: 2